  <script>
    const baseRepairs = [
      { name: "Leaky faucet", fix: "Turn off water supply. Use a wrench to remove the faucet handle. Replace the washer or O-ring inside. Reassemble and test." },
      { name: "Loose door handle", fix: "Locate the set screw (usually hidden under a cover). Use an Allen wrench to tighten it. If threads are stripped, replace the handle." },
      { name: "Squeaky door", fix: "Apply WD-40 or oil to the hinge pins. Open and close the door several times to distribute the lubricant. Wipe excess oil." },
      { name: "Flat bicycle tire", fix: "Remove the wheel. Locate the puncture. Use a patch kit or replace the inner tube. Pump air back into the tire." },
      { name: "Broken shoelace", fix: "Thread a new shoelace through the eyelets. Start from the bottom and alternate sides. Tie a secure knot at the top." },
      { name: "Clogged sink", fix: "Remove visible debris. Use a plunger or plumbing snake to clear the blockage. Flush with hot water and baking soda." },
      { name: "Running toilet", fix: "Check the flapper in the tank. If worn, replace it. Adjust the float if water level is too high. Call a plumber if needed." },
      { name: "Loose cabinet hinge", fix: "Tighten the screws on the hinge using a screwdriver. If holes are enlarged, use larger screws or fill with dowels." },
      { name: "Torn shirt button", fix: "Thread a needle. Sew the button back on with 4-6 passes through each hole. Tie off the thread securely inside the shirt." },
      { name: "Dead remote batteries", fix: "Open the battery compartment. Remove old batteries and replace with new ones of the same size. Check polarity (+ and -)." },
      { name: "Jammed drawer", fix: "Empty the drawer. Check for obstructions. Lubricate the tracks with silicone spray. Slide gently until it moves freely." },
      { name: "Scratched wall paint", fix: "Sand the scratched area lightly. Apply matching paint with a small brush. Let dry and apply a second coat if needed." },
      { name: "Loose shelf", fix: "Remove items from the shelf. Tighten all mounting bolts with a wrench. Use a level to ensure it's straight." },
      { name: "Broken zipper", fix: "Check if the slider is stuck. Apply graphite or silicone lubricant. If the slider is broken, replace the zipper entirely." },
      { name: "Tangled necklace", fix: "Place on a flat surface. Apply a small amount of oil or lotion. Gently work the knots apart with tweezers or a needle." },
      { name: "Wobbly chair", fix: "Check all four legs. Tighten screws and bolts underneath. If legs are uneven, use shims or felt pads to stabilize." },
      { name: "Dirty fan", fix: "Unplug the fan. Wipe blades with a damp cloth. Use a brush or vacuum to remove dust from the grille and vents." },
      { name: "Cracked phone screen protector", fix: "Peel off the old protector carefully. Clean the screen with a microfiber cloth. Apply a new screen protector smoothly." },
      { name: "Sticky keyboard keys", fix: "Gently pry off the key cap. Clean underneath with a brush and compressed air. Wipe with a slightly damp cloth and let dry." },
      { name: "Loose bed frame", fix: "Check all bolts and screws connecting the frame pieces. Tighten with a wrench or screwdriver. Add a center support if needed." },
      { name: "Burnt light bulb", fix: "Turn off the light. Let the bulb cool completely. Unscrew and replace with a new bulb of the same wattage." },
      { name: "Peeling wallpaper", fix: "Gently lift the edge. Apply wallpaper adhesive underneath. Press down firmly and smooth out air bubbles." },
      { name: "Clogged shower drain", fix: "Remove the drain cover. Use a plumbing snake or wire coat hanger to pull out hair and debris. Flush with hot water." },
      { name: "Loose electrical plug", fix: "Unplug the device. Check the outlet for loose contacts. If worn out, have an electrician replace the outlet." },
      { name: "Broken curtain hook", fix: "Remove the broken hook from the curtain. Replace with a new hook of the same size. Hang the curtain back on the rod." },
      { name: "Dusty air vent", fix: "Turn off the air system. Use a brush or vacuum to remove dust from the vent slats. Wipe with a slightly damp cloth." },
      { name: "Unstable table", fix: "Check all legs for damage. Tighten bolts and screws. If a leg is bent, replace it or use shims to level the table." },
      { name: "Loose bicycle chain", fix: "Locate the barrel adjuster on the rear derailleur. Turn counterclockwise to add tension. Check that the chain doesn't rub." },
      { name: "Broken backpack strap", fix: "If separated from the pack, sew it back with heavy-duty thread. If the strap is torn, patch it or replace the entire strap." },
      { name: "Torn book cover", fix: "If detached, reglue it with bookbinding adhesive. If torn, reinforce the tear with tape on the inside of the cover." },
      { name: "Jammed window", fix: "Check for obstructions or paint sealing it shut. Apply lubricant to the tracks. Gently tap and slide to free it." },
      { name: "Dirty carpet stain", fix: "Blot excess liquid with a cloth. Mix carpet cleaner per instructions. Apply to the stain and blot repeatedly until clean." },
      { name: "Bent glasses frame", fix: "Gently bend the frame back into shape. If plastic is cracked, use super glue. If metal is bent badly, visit an optician." },
      { name: "Weak flashlight", fix: "Replace the batteries with fresh ones. Check that the battery contacts are clean. If still weak, the bulb may need replacement." },
      { name: "Rusty screws", fix: "Apply penetrating oil and let sit for 30 minutes. Use a screwdriver with a good grip to remove slowly. Replace with stainless screws." },
      { name: "Loose tile", fix: "Remove the loose tile carefully. Scrape off old adhesive. Apply new tile adhesive and press the tile back firmly." },
      { name: "Cracked flower pot", fix: "If a small crack, seal with waterproof sealant. If large or multiple cracks, it's best to replace the pot." },
      { name: "Broken pencil sharpener", fix: "Empty the shavings. Check the blade for damage or dullness. Tighten the blade if it's loose, or replace the blade." },
      { name: "Sticky door lock", fix: "Apply lubricant spray or graphite powder into the lock. Insert and turn the key several times. Wipe away excess lubricant." },
      { name: "Sagging mattress", fix: "Flip and rotate the mattress regularly. If springs are shot, add a mattress topper. Eventually, you may need to replace it." },
      { name: "Loose tap handle", fix: "Look for a set screw near the handle base. Tighten with an Allen wrench. If missing, replace the handle." },
      { name: "Cracked plastic container", fix: "For small cracks, seal with super glue or plastic epoxy. For large cracks, replace the container." },
      { name: "Dirty refrigerator coils", fix: "Unplug the fridge. Locate coils (usually behind or underneath). Use a brush and vacuum to remove dust buildup." },
      { name: "Misaligned cupboard door", fix: "Open the door fully. Check for loose hinges and tighten screws. Adjust hinge screws to align the door properly." },
      { name: "Worn-out mop handle", fix: "If cracked, reinforce with duct tape or replace the handle. If the mop head is worn, replace just the head." },
      { name: "Torn pillowcase", fix: "Sew a seam to close the tear using matching thread. Or, patch the hole with iron-on fabric or hand-stitched patch." },
      { name: "Loose toilet seat", fix: "Locate bolts under the seat. Tighten with a wrench from underneath the bowl. Don't over-tighten to avoid cracking." },
      { name: "Broken clothes hanger", fix: "If a hook is broken, replace the hanger. If the wire frame is bent, carefully reshape it or buy a new one." },
      { name: "Creaky floorboard", fix: "Try nailing the board to the joist below using a hammer and nails. Or drive screws at an angle from underneath." },
      { name: "Dirty computer fan", fix: "Turn off and unplug the computer. Use compressed air to blow dust out of the fan. Avoid spinning the fan." },
      { name: "Stuck zipper", fix: "Apply graphite from a pencil, WD-40, or silicone lubricant to the teeth. Gently wiggle the slider back and forth." },
      { name: "Loose window latch", fix: "Tighten the screws on the latch mechanism. If the latch is bent, carefully straighten it or replace it." },
      { name: "Scratched wooden table", fix: "Sand the scratched area with fine-grit sandpaper. Apply wood stain to match. Finish with polyurethane or wax." },
      { name: "Broken headphone wire", fix: "Locate the break in the wire. Strip the insulation and use a wire connector or solder to join them. Test before use." },
      { name: "Jammed stapler", fix: "Open the stapler and remove any bent staples. Clear the jam mechanism. Reload with fresh staples and test." },
      { name: "Loose bike pedal", fix: "Use a pedal wrench or Allen key to tighten. Left pedal tightens counterclockwise (reverse thread). Right pedal tightens clockwise." },
      { name: "Cracked mug handle", fix: "If still attached, reinforce with super glue and let cure. If broken off, glue back on. Or use the mug without a handle." },
      { name: "Dirty oven tray", fix: "Soak in hot soapy water for 30 minutes. Scrub with a brush or steel wool. For stubborn spots, use baking soda paste." },
      { name: "Wobbly lamp", fix: "Check that the base is on a level surface. Tighten all screws and bolts. If the stem is bent, straighten or replace it." },
      { name: "Broken broom handle", fix: "If cracked, wrap with duct tape as a temporary fix. For a permanent fix, replace the handle or the entire broom." },
      { name: "Loose nail in wall", fix: "Tap the nail back in with a hammer. If it won't hold, remove it, fill the hole with spackle, and use a screw instead." },
      { name: "Peeling sticker residue", fix: "Warm the residue with a heat gun or hair dryer. Peel off slowly. Remove remaining residue with rubbing alcohol." },
      { name: "Clogged vacuum hose", fix: "Unplug the vacuum. Use a straightened coat hanger or plumbing snake to push out the blockage. Rinse with water if needed." },
      { name: "Loose picture frame", fix: "Check the wire or hanging hardware on the back. Tighten or reattach as needed. Ensure the wall hook is secure." },
      { name: "Torn jeans seam", fix: "Turn the jeans inside out. Sew the seam back together using a needle and thread. Reinforce with a patch for durability." },
      { name: "Weak Wi-Fi router placement", fix: "Move the router to a central, elevated location. Away from obstacles and metal objects. Ensure antennas are positioned vertically and horizontally." },
      { name: "Broken keychain ring", fix: "If the ring split, replace it. If a key fell off, reattach to a new ring. Look for reinforced key rings." },
      { name: "Sticky scissors", fix: "Clean the blades with a damp cloth and dry thoroughly. Apply oil to the pivot bolt. Open and close several times to distribute." },
      { name: "Scratched CD case", fix: "Light scratches may not affect playback. For heavy scratches affecting data, the CD may be unreadable. Consider backing up data." },
      { name: "Loose sink pipe", fix: "Locate the coupling nut where the pipe connects. Use a wrench to tighten. Place a bucket underneath to catch drips." },
      { name: "Dirty shoe soles", fix: "Use a brush or old toothbrush with warm soapy water. Scrub the sole thoroughly. Rinse and let dry completely." },
      { name: "Bent spoon", fix: "Place on a solid surface. Gently tap with a hammer to straighten. Be careful not to crack the metal." },
      { name: "Broken toy wheel", fix: "If the axle is intact, snap the wheel back on. If the wheel is cracked, replace it. Check for sharp edges." },
      { name: "Loose cabinet knob", fix: "Tighten the screw from inside the cabinet. If threads are stripped, use a larger screw or dowel filler." },
      { name: "Torn school bag pocket", fix: "Sew the seam back together or patch the hole from the inside. Use a heavy-duty thread for durability." },
      { name: "Cracked soap dish", fix: "If still functional, use it as is. If cracked badly or sharp edges form, replace the dish for safety." },
      { name: "Dirty window screen", fix: "Remove the screen. Brush off dust and debris. Rinse with a hose. Let dry and reinstall." },
      { name: "Loose curtain rod", fix: "Check that bracket bolts are tight. If the wall bracket is damaged, drill new holes and install a new bracket." },
      { name: "Broken pen spring", fix: "If the spring popped out, try to reinstall it. If lost, replace the pen. A new one is usually cheaper than repair." },
      { name: "Misaligned drawer track", fix: "Open the drawer fully. Check for obstructions or bent tracks. Straighten bent tracks with a hammer and adjust rollers." },
      { name: "Sticky fridge door", fix: "Check the gasket (seal) for dirt or damage. Clean it with warm soapy water. If damaged, replace the gasket." },
      { name: "Loose watch strap", fix: "Find the spring bars holding the strap. Use a small tool to push them inward and slide the strap off. Install a new strap." },
      { name: "Broken mop bucket wheel", fix: "If the wheel popped off, snap it back on the axle. If the wheel is cracked, replace it. Most hardware stores have replacement wheels." },
      { name: "Cracked phone case", fix: "If the crack is minor, the case still protects. If major or sharp, replace the case for better protection." },
      { name: "Dirty mirror", fix: "Use a glass cleaner and lint-free cloth. Spray the cleaner and wipe in circular motions. Buff dry for a streak-free shine." },
      { name: "Weak door magnet", fix: "Check if the magnet has been dislodged. Reposition or replace the magnetic strip. Ensure it aligns with the strike." },
      { name: "Loose car mirror", fix: "Locate the mount bolts on the door. Tighten with the appropriate wrench. Ensure the mirror is positioned safely." },
      { name: "Torn notebook pages", fix: "Carefully trim away the torn edge with scissors or a paper cutter. The notebook is still usable with slightly smaller pages." },
      { name: "Stained couch cover", fix: "Check the care label. For washable covers, remove and wash per instructions. For non-washable, use a stain remover appropriate for the fabric." },
      { name: "Jammed bicycle brake", fix: "Check for debris in the brake mechanism. Clean thoroughly. Adjust cable tension if too tight. Test braking action." },
      { name: "Loose extension cord socket", fix: "Check the plug connection and outlet. Tighten the outlet with a screwdriver if accessible. If damaged, replace the extension cord." },
      { name: "Broken sandal strap", fix: "If glued, try to reglue with shoe glue. If stitched, hand-sew it back. If severely damaged, a cobbler may be able to fix it." },
      { name: "Dirty sink filter", fix: "Remove the filter. Rinse under running water, brushing away debris. Soak in hot water if clogged. Let dry before reinstalling." },
      { name: "Loose guitar string", fix: "Locate the tuning peg for that string. Turn the peg to tighten the string. Use a tuner to get the correct pitch." },
      { name: "Cracked ruler", fix: "Light cracks don't affect functionality for most uses. Heavy cracks may make it unreliable for measurements. Consider replacing." },
      { name: "Broken umbrella rib", fix: "If a rib is bent, carefully straighten it with pliers. If broken, try to splice and tape it. Or replace the entire umbrella." },
      { name: "Stuck bottle cap", fix: "Run hot water over the cap to expand the metal. Try again. Or tap the cap gently with a hammer and twist. Don't force it." },
      { name: "Torn mosquito net", fix: "If the tear is small, patch it with netting repair patch or fabric glue. For large tears, consider replacing the entire net." },
      { name: "Loose TV cable", fix: "Check all cable connections (HDMI, power, etc.). Tighten by hand or with the appropriate connector tool. Ensure cables aren't kinked." },
      { name: "Dirty ceiling light", fix: "Turn off the light and let it cool. Wipe the fixture with a dry cloth. For glass covers, use a damp cloth and dry immediately." },
      { name: "Broken ruler edge", fix: "If one edge is rough or damaged, a replacement ruler is inexpensive. Current ruler still functions with a damaged edge." },
      { name: "Loose backpack zipper pull", fix: "Check the stitching that attaches the pull. Re-stitch if loose. If lost, tie a small cord or loop to the slider instead." },
      { name: "Dirty TV screen", fix: "Turn off and unplug the TV. Use a soft, lint-free cloth. Use a special screen cleaner if needed. Never spray liquid directly on the screen." },
      { name: "Bent fork", fix: "Place the fork on a sturdy surface. Gently tap with a hammer to straighten the bent prong. Test that all prongs align." },
      { name: "Stained bedsheet", fix: "Treat the stain immediately with an appropriate cleaner. Wash in hot water if the fabric allows. Dry completely before putting back on." },
      { name: "Loose shoe sole", fix: "Clean the surfaces of glue and debris. Apply shoe glue and press firmly for the recommended time. Clamp or weight down while drying." },
      { name: "Cracked bucket handle", fix: "If cracked but attached, reinforce with duct tape. If the handle broke off, glue it back with epoxy or replace the bucket." },
      { name: "Sticky light switch", fix: "Turn off power at the breaker. Remove the switch cover. Clean the switch mechanism with a dry brush. Reinstall and test." },
      { name: "Torn curtain edge", fix: "Fold the torn edge over and sew it down by hand or machine. Or apply fabric tape to the torn area as a quick fix." },
      { name: "Loose bicycle seat", fix: "Locate the seat post clamp bolt. Tighten with an Allen key. If the seat rocks side to side, adjust the rails in the clamp." },
      { name: "Dirty keyboard screen", fix: "Use a soft brush or compressed air to remove dust. Wipe gently with a slightly damp cloth. Dry immediately to prevent water damage." },
      { name: "Broken lunchbox clip", fix: "If the clip broke off, try to glue it back with plastic epoxy. If lost, you can still use the lunchbox without the clip." },
      { name: "Weak alarm clock battery", fix: "Open the battery compartment. Remove and replace with a fresh battery of the same type. Ensure correct polarity." },
      { name: "Scratched phone cover", fix: "Light scratches don't affect function. If the cover is cracked or has deep scratches, consider replacing it for better protection." },
      { name: "Loose sink stopper", fix: "Check the stopper mechanism underneath. Tighten the adjustment nut. If the stopper doesn't seal, replace it." },
      { name: "Bent paper clip holder", fix: "Straighten the bent wire or clip by hand or with pliers. If severely bent or broken, replace the holder." },
      { name: "Broken tape dispenser", fix: "Check the cutting blade for dullness or damage. If dull, replace or sharpen. If the roller is stuck, apply lubricant." },
      { name: "Dusty bookshelf", fix: "Remove books section by section. Dust the shelf surface and back panel. Wipe each book cover before replacing." },
      { name: "Loose ceiling fan screw", fix: "Turn off the fan and let blades stop. Locate the loose screw and tighten with the appropriate tool. Check all screws." },
      { name: "Torn glove fingertip", fix: "If the tear is small, sew it closed. If large or multiple tears, the glove is no longer protective. Consider replacing." },
      { name: "Broken toy battery cover", fix: "If the cover popped off, snap it back on. If it's cracked, glue it or replace. Ensure it closes securely." },
      { name: "Sticky table surface", fix: "Wipe with warm soapy water and a cloth. For stubborn stickiness, use a mixture of vinegar and water. Dry thoroughly." },
      { name: "Cracked plastic chair leg", fix: "If the crack is small, reinforce with epoxy glue and wrap with tape. If major, replace the leg if possible, or use shims." },
      { name: "Loose cupboard shelf pin", fix: "Check that shelf pins are fully inserted and aligned. Reinsert if loose. If pins are bent, replace them." },
      { name: "Dirty shoe laces", fix: "Remove the laces and soak in warm soapy water for 15 minutes. Scrub with a brush if needed. Rinse and let dry completely." },
      { name: "Broken laundry basket handle", fix: "If the handle broke off, try to reglue with plastic epoxy and clamp while drying. If that fails, replace the basket." },
      { name: "Jammed cupboard lock", fix: "Apply lubricant spray in the lock mechanism. Work the key in and out gently. If it still won't work, the lock may need replacement." },
      { name: "Torn mattress cover", fix: "Sew the tear closed using a needle and thread. Reinforce the seam with a patch for durability." },
      { name: "Weak calculator battery", fix: "Locate the battery compartment (usually on the back). Replace the old battery with a fresh one of the same type." },
      { name: "Loose backpack buckle", fix: "Check the stitching that attaches the buckle. Re-stitch if loose. If stitching keeps breaking, the backpack may be worn out." },
      { name: "Cracked mirror corner", fix: "Light cracks are cosmetic. For safety, tape a strong tape over the cracked area. For serious cracks, replace the mirror." },
      { name: "Dirty dish rack", fix: "Remove and rinse the rack thoroughly. Scrub with a brush to remove food debris. Let dry before using." },
      { name: "Broken key holder hook", fix: "If the hook broke, replace the holder or drill a new hole to hang it elsewhere. Most key holders are inexpensive." },
      { name: "Bent notebook spiral", fix: "Carefully straighten the bent coils with pliers or by hand. If severely damaged, consider replacing the notebook." },

      { name: "Sticky remote buttons", fix: "Clean the buttons with isopropyl alcohol and a cotton swab. Let dry completely. If buttons still stick, the remote may need replacement." },

      { name: "Loose desk drawer handle", fix: "Locate the bolts or screws holding the handle. Tighten with a wrench or screwdriver. If stripped, use a larger bolt." },
      { name: "Dirty wall corner", fix: "Wipe with a damp cloth and a little all-purpose cleaner. For stubborn marks, use a magic eraser sponge." },

      { name: "Dirty window rail", fix: "Vacuum or brush to remove dust and debris. Wipe with a damp cloth. For stubborn grime, use a mixture of vinegar and water." },
      { name: "Broken toy button", fix: "If the button fell off, sew it back on with thread or use glue suitable for plastic. Ensure it's secure before giving to child." },
      { name: "Weak bicycle bell", fix: "Check the battery if electronic. For mechanical bells, ensure the clapper moves freely and the bell isn't dented. Replace if necessary." },
      { name: "Loose charger cable", fix: "Check the connection at both the charger and device. Tighten if there's a connector. For a loose connector, the cable may need replacement." },
      { name: "Cracked pencil case", fix: "For minor cracks, tape the exterior with strong tape. For major damage, replace the case to protect its contents." },
      { name: "Sticky cupboard handle", fix: "Clean the handle with warm soapy water and a cloth. If sticky residue remains, use rubbing alcohol or a small amount of mineral oil." },
      { name: "Torn towel edge", fix: "Fold the torn edge over and sew it down for a finished look. This reinforces the seam and prevents further unraveling." },
