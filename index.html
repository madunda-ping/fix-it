      const results = document.getElementById("results");
      const searchInput = document.getElementById("searchInput");

      function renderRepairs(search = "") {
        results.innerHTML = "";

        const filtered = repairs.filter(
          (item) =>
            item.name.toLowerCase().includes(search.toLowerCase()) ||
            item.fix.toLowerCase().includes(search.toLowerCase()),
        );

        if (filtered.length === 0) {
          results.innerHTML = `
          <div class="col-span-full text-center text-gray-500 text-xl">
            No repairs found
          </div>
        `;
          return;
        }

        filtered.forEach((item) => {
          const card = document.createElement("div");

          card.className =
            "card bg-white rounded-xl shadow-md hover:shadow-xl transition p-5 border-l-4 border-orange-500 cursor-pointer";

          card.innerHTML = `
          <h3 class="text-xl font-bold mb-2">${item.name}</h3>

          <p class="text-gray-600 line-clamp-3">
            ${item.fix}
          </p>

          <div class="mt-4 text-orange-600 font-semibold flex items-center gap-2">
            View Guide
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        `;

          card.addEventListener("click", () => openModal(item));

          results.appendChild(card);
        });

        lucide.createIcons();
      }

      searchInput.addEventListener("input", (e) => {
        renderRepairs(e.target.value);
      });

      // MODAL
      const modal = document.getElementById("modal");
      const modalTitle = document.getElementById("modalTitle");
      const modalText = document.getElementById("modalText");

      function openModal(item) {
        modalTitle.textContent = item.name;
        modalText.textContent = item.fix;

        modal.classList.remove("hidden");

        lucide.createIcons();
      }

      document.getElementById("closeModal").addEventListener("click", () => {
        modal.classList.add("hidden");
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.classList.add("hidden");
        }
      });

      // THEME
      const themeBtn = document.getElementById("themeBtn");

      themeBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
          themeBtn.textContent = "Light Mode";
        } else {
          themeBtn.textContent = "Dark Mode";
        }
      });

      renderRepairs();

      lucide.createIcons();
    </script>
